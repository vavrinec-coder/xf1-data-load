name: Deploy Excel Add-in Pages

on:
  push:
    branches:
      - main
    paths:
      - "excel-addin/**"
      - ".github/workflows/deploy-addin-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: excel-addin
    env:
      ADDIN_BASE_URL: https://vavrinec-coder.github.io/xf1-data-load
      ADDIN_PUBLIC_PATH: /xf1-data-load/
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            excel-addin/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build GitHub Pages bundle
        run: npm run build:pages

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: excel-addin/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
